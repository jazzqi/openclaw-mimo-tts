name: CI - xiaomi-mimo-tts

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Make scripts executable
        run: |
          chmod +x ./scripts/*.sh || true
          chmod +x ./scripts/*/*.sh || true
      - name: Run local mock test
        run: |
          ./scripts/test_local.sh --mock
